services:
  web-traffic:
    container_name: web-traffic
    build:
      context: ./cloudflare-traffic
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3000"
    environment:
      # --- Nuxt 基本設定 ---
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_SECRET=${NUXT_SECRET}

      # --- 主資料庫 ---
      - NUXT_DB_HOST=${NUXT_DB_HOST}
      - NUXT_DB_USER=${NUXT_DB_USER}
      - NUXT_DB_PASSWORD=${NUXT_DB_PASSWORD}
      - NUXT_DB_NAME=${NUXT_DB_NAME}

      # --- 流量資料庫 ---
      - NUXT_TRAFFIC_DB_HOST=${TRAFFIC_DB_HOST}
      - NUXT_TRAFFIC_DB_USER=${TRAFFIC_DB_USER}
      - NUXT_TRAFFIC_DB_PASSWORD=${TRAFFIC_DB_PASSWORD}
      - NUXT_TRAFFIC_DB_NAME=${TRAFFIC_DB_NAME}

      # --- Cloudflare 設定 ---
      - NUXT_CF_API_TOKEN=${CF_API_TOKEN}
      - NUXT_CF_ZONE_ID_TW=${CF_ZONE_ID_TW}
      - NUXT_CF_ZONE_ID_MY=${CF_ZONE_ID_MY}

  # ▼▼▼ Zabbix Server 核心 ▼▼▼
  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: zabbix-server
    restart: always
    environment:
      # 直接引用 .env 裡的主資料庫設定
      - DB_SERVER_HOST=${NUXT_DB_HOST}
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=${NUXT_DB_USER}
      - MYSQL_PASSWORD=${NUXT_DB_PASSWORD}
      - ZBX_CACHESIZE=256M
      - TZ=Asia/Taipei
    ports:
      - "10051:10051"

  # ▼▼▼ Zabbix Web 前端介面 ▼▼▼
  zabbix-web:
    build:
      context: .
      dockerfile: Dockerfile.zabbix-web
    container_name: zabbix-web
    restart: always
    ports:
      - "3004:8080"
    environment:
      - DB_SERVER_HOST=${NUXT_DB_HOST}
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=${NUXT_DB_USER}
      - MYSQL_PASSWORD=${NUXT_DB_PASSWORD}
      - ZBX_SERVER_HOST=zabbix-server
      - PHP_TZ=Asia/Taipei
    depends_on:
      - zabbix-server
